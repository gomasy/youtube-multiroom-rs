name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Build frontend
        working-directory: front
        run: |
          npm ci
          npm run build
      - name: Build
        run: cargo build --release --locked
      - name: Package
        run: |
          mkdir -p pkg/youtube-multiroom/front
          cp target/release/youtube-multiroom pkg/youtube-multiroom/
          cp -r front/dist pkg/youtube-multiroom/front/dist
          tar -C pkg -czf "youtube-multiroom-${{ matrix.target }}.tar.gz" youtube-multiroom
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target }}
          path: youtube-multiroom-*.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/binaries
          pattern: binaries-*
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ runner.temp }}/binaries/youtube-multiroom-*.tar.gz
          generate_release_notes: true
