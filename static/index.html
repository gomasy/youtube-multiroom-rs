<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube MultiRoom</title>
<style>
  :root {
    --bg:        #0a0a0a;
    --surface:   #161616;
    --surface-2: #222222;
    --surface-3: #2e2e2e;
    --border:    #333333;
    --text:      #e8e8e8;
    --text-dim:  #888888;
    --accent:    #ff4040;
    --accent-2:  #ff6b6b;
    --green:     #1ed760;
    --yellow:    #f5c542;
    --radius:    10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
                 "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 20px 16px 140px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    padding-top: 8px;
  }
  .header svg { flex-shrink: 0; }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    margin-left: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  .header .dot.disconnected { background: var(--text-dim); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── URL Input ── */
  .url-section {
    margin-bottom: 24px;
  }
  .url-row {
    display: flex;
    gap: 8px;
  }
  .url-input {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--text-dim); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent-2); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--text-dim); background: var(--surface-2); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }

  /* ── Now Playing ── */
  .now-playing {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    transition: opacity 0.3s;
  }
  .now-playing.empty { opacity: 0.5; }
  .now-playing .track-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
  }
  .track-thumb {
    width: 64px;
    height: 64px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    background: var(--surface-3);
    flex-shrink: 0;
  }
  .track-thumb-placeholder {
    width: 64px;
    height: 64px;
    border-radius: var(--radius-sm);
    background: var(--surface-3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .track-info { flex: 1; min-width: 0; }
  .track-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .track-meta {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ── Section label ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ── Device List ── */
  .devices-section { margin-bottom: 24px; }
  .device-list { display: flex; flex-direction: column; gap: 8px; }

  .device-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .device-card:hover { border-color: var(--text-dim); }
  .device-card.selected { border-color: var(--accent); background: rgba(255, 64, 64, 0.06); }

  .device-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }
  .device-card.selected .device-check {
    border-color: var(--accent);
    background: var(--accent);
  }
  .device-check-inner {
    width: 8px; height: 8px;
    background: #fff;
    border-radius: 50%;
    display: none;
  }
  .device-card.selected .device-check-inner { display: block; }

  .device-info { flex: 1; min-width: 0; }
  .device-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .device-status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.idle { background: var(--text-dim); }
  .status-dot.playing { background: var(--green); }
  .status-dot.paused { background: var(--yellow); }
  .status-dot.queued { background: var(--accent); }
  .status-dot.error { background: #e53935; }

  .device-track-name {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
  }
  .delete-btn:hover { color: #e53935; background: rgba(229, 57, 53, 0.1); }

  /* ── Empty states ── */
  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.6;
  }
  .empty-state svg { margin-bottom: 12px; opacity: 0.4; }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .controls .btn { flex: 1; }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .toast {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    animation: toast-in 0.3s ease;
    max-width: 380px;
    text-align: center;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── History ── */
  .history-section { margin-top: 32px; }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .history-item:hover { background: var(--surface-2); border-color: var(--border); }

  /* ── Auth Modal ── */
  .auth-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    max-width: 360px;
    width: 90%;
    text-align: center;
  }
  .auth-box h2 { font-size: 16px; margin-bottom: 8px; }
  .auth-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }

  .history-thumb {
    width: 40px; height: 40px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface-3);
    flex-shrink: 0;
  }
  .history-info { flex: 1; min-width: 0; }
  .history-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-meta { font-size: 11px; color: var(--text-dim); }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <rect width="24" height="24" rx="6" fill="var(--accent)"/>
      <polygon points="10,7 10,17 17,12" fill="#fff"/>
    </svg>
    <h1>YouTube MultiRoom</h1>
    <div class="dot" id="wsIndicator" title="サーバー接続中"></div>
  </div>

  <!-- URL Input -->
  <div class="url-section">
    <div class="url-row">
      <input
        type="text"
        class="url-input"
        id="urlInput"
        placeholder="YouTube URL を貼り付け..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn" id="extractBtn" onclick="extractAudio()">取得</button>
    </div>
  </div>

  <!-- Now Playing -->
  <div class="now-playing empty" id="nowPlaying">
    <div class="track-row">
      <div class="track-thumb-placeholder" id="thumbPlaceholder">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M9 18V5l12-2v13" stroke="var(--text-dim)" stroke-width="1.5" fill="none"/>
          <circle cx="6" cy="18" r="3" stroke="var(--text-dim)" stroke-width="1.5" fill="none"/>
          <circle cx="18" cy="16" r="3" stroke="var(--text-dim)" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <img class="track-thumb" id="trackThumb" style="display:none" alt=""/>
      <div class="track-info">
        <div class="track-title" id="trackTitle">曲が選択されていません</div>
        <div class="track-meta" id="trackMeta">YouTube URL を入力して取得してください</div>
      </div>
    </div>
  </div>

  <!-- Devices -->
  <div class="devices-section">
    <div class="section-label">デバイス</div>
    <div class="device-list" id="deviceList">
      <div class="empty-state" id="emptyDevices">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="var(--text-dim)" stroke-width="1.5"/>
          <path d="M12 8v4M12 14.5v.5" stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div>まだデバイスが接続されていません</div>
        <div style="margin-top:6px; font-size:12px">
          Echo で「アレクサ、YouTube プレーヤーを開いて」と<br>
          言うとデバイスが登録されます
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls" id="controls" style="display:none">
      <button class="btn" id="playBtn" onclick="playOnSelected()" disabled>
        ▶ 選択デバイスで再生
      </button>
      <button class="btn btn-outline btn-sm" onclick="selectAllDevices()">全選択</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="section-label">取得済みトラック</div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<!-- Auth Modal -->
<div class="auth-modal" id="authModal" style="display:none">
  <div class="auth-box">
    <h2>認証が必要です</h2>
    <p>API トークンを入力してください</p>
    <input type="password" class="url-input" id="tokenInput" placeholder="API_TOKEN" />
    <button class="btn" id="authBtn" onclick="saveToken()" style="width:100%; margin-top:12px">接続</button>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ────────────────────────────────────────
// State
// ────────────────────────────────────────
let apiToken = localStorage.getItem("api_token");
let keepAliveInterval = null;

const state = {
  ws: null,
  connected: false,
  currentTrack: null,   // { id, title, thumbnail, duration, channel }
  devices: {},          // { device_id: { ... } }
  selectedDevices: new Set(),
  tracks: {},           // { track_id: { ... } }
};

// ────────────────────────────────────────
// Helpers
// ────────────────────────────────────────
function formatDuration(seconds) {
  if (!seconds) return "--:--";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}

function statusLabel(status) {
  const map = {
    idle: "待機中",
    playing: "再生中",
    paused: "一時停止",
    stopped: "停止",
    queued: "キュー済み",
    error: "エラー",
  };
  return map[status] || status;
}

function authHeaders() {
  const h = { "Content-Type": "application/json" };
  if (apiToken) h["Authorization"] = `Bearer ${apiToken}`;
  return h;
}

async function authFetch(url, options = {}) {
  options.headers = { ...authHeaders(), ...options.headers };
  const res = await fetch(url, options);
  if (res.status === 401) {
    showAuthModal();
    throw new Error("認証が必要です");
  }
  return res;
}

function showAuthModal() {
  document.getElementById("authModal").style.display = "flex";
  document.getElementById("tokenInput").focus();
}

async function saveToken() {
  const token = document.getElementById("tokenInput").value.trim();
  if (!token) return;
  apiToken = token;
  localStorage.setItem("api_token", token);

  try {
    const res = await fetch("/api/tracks", { headers: authHeaders() });
    if (res.status === 401) {
      showToast("トークンが正しくありません");
      return;
    }
  } catch {}

  document.getElementById("authModal").style.display = "none";
  connectWS();
}

function showToast(msg, duration = 4000) {
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.getElementById("toastContainer").appendChild(el);
  setTimeout(() => {
    el.style.opacity = "0";
    el.style.transition = "opacity 0.3s";
    setTimeout(() => el.remove(), 300);
  }, duration);
}

// ────────────────────────────────────────
// WebSocket
// ────────────────────────────────────────
function connectWS() {
  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  let wsUrl = `${protocol}//${location.host}/ws`;
  if (apiToken) wsUrl += `?token=${encodeURIComponent(apiToken)}`;

  state.ws = new WebSocket(wsUrl);

  state.ws.onopen = () => {
    state.connected = true;
    document.getElementById("wsIndicator").classList.remove("disconnected");
    console.log("WebSocket connected");
  };

  state.ws.onclose = () => {
    state.connected = false;
    document.getElementById("wsIndicator").classList.add("disconnected");
    console.log("WebSocket disconnected, reconnecting...");
    setTimeout(connectWS, 3000);
  };

  state.ws.onerror = () => {
    state.ws.close();
  };

  state.ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleWSMessage(data);
  };

  if (keepAliveInterval) clearInterval(keepAliveInterval);
  keepAliveInterval = setInterval(() => {
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
      state.ws.send(JSON.stringify({ type: "ping" }));
    }
  }, 30000);
}

function handleWSMessage(data) {
  if (data.type === "init") {
    state.devices = data.devices || {};
    state.tracks = data.tracks || {};
    renderDevices();
    renderHistory();
  } else if (data.type === "device_update") {
    state.devices = data.devices || {};
    renderDevices();
  }
}

// ────────────────────────────────────────
// API calls
// ────────────────────────────────────────
async function extractAudio() {
  const input = document.getElementById("urlInput");
  const btn = document.getElementById("extractBtn");
  const url = input.value.trim();

  if (!url) {
    showToast("URLを入力してください");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>取得中';

  try {
    const res = await authFetch("/api/audio/extract", {
      method: "POST",
      body: JSON.stringify({ url }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "取得に失敗しました");
    }

    const track = await res.json();
    state.currentTrack = track;
    state.tracks[track.id] = track;
    renderNowPlaying();
    renderHistory();
    updatePlayButton();
    showToast(`「${track.title}」を取得しました`);
    input.value = "";
  } catch (e) {
    showToast(`エラー: ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = "取得";
  }
}

async function playOnSelected() {
  if (!state.currentTrack) {
    showToast("先にトラックを取得してください");
    return;
  }
  if (state.selectedDevices.size === 0) {
    showToast("再生するデバイスを選択してください");
    return;
  }

  const btn = document.getElementById("playBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>キュー中';

  try {
    const res = await authFetch("/api/play", {
      method: "POST",
      body: JSON.stringify({
        track_id: state.currentTrack.id,
        device_ids: Array.from(state.selectedDevices),
      }),
    });

    const data = await res.json();
    showToast(data.message || "再生をキューしました", 6000);
  } catch (e) {
    showToast(`エラー: ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = "▶ 選択デバイスで再生";
  }
}

// ────────────────────────────────────────
// Rendering
// ────────────────────────────────────────
function renderNowPlaying() {
  const container = document.getElementById("nowPlaying");
  const thumb = document.getElementById("trackThumb");
  const placeholder = document.getElementById("thumbPlaceholder");
  const title = document.getElementById("trackTitle");
  const meta = document.getElementById("trackMeta");

  if (!state.currentTrack) {
    container.classList.add("empty");
    thumb.style.display = "none";
    placeholder.style.display = "flex";
    title.textContent = "曲が選択されていません";
    meta.textContent = "YouTube URL を入力して取得してください";
    return;
  }

  container.classList.remove("empty");
  const t = state.currentTrack;

  if (t.thumbnail) {
    thumb.src = t.thumbnail;
    thumb.style.display = "block";
    placeholder.style.display = "none";
  }

  title.textContent = t.title;
  const parts = [];
  if (t.channel) parts.push(t.channel);
  parts.push(formatDuration(t.duration));
  meta.textContent = parts.join(" · ");
}

function renderDevices() {
  const list = document.getElementById("deviceList");
  const empty = document.getElementById("emptyDevices");
  const controls = document.getElementById("controls");
  const entries = Object.values(state.devices);

  if (entries.length === 0) {
    empty.style.display = "block";
    controls.style.display = "none";
    return;
  }

  empty.style.display = "none";
  controls.style.display = "flex";

  // 既存カード以外をクリア (empty stateは残す)
  list.querySelectorAll(".device-card").forEach((el) => el.remove());

  entries.forEach((dev) => {
    const selected = state.selectedDevices.has(dev.device_id);
    const card = document.createElement("div");
    card.className = `device-card${selected ? " selected" : ""}`;
    card.onclick = () => toggleDevice(dev.device_id);

    const trackName = dev.current_track ? dev.current_track.title : "";
    card.innerHTML = `
      <div class="device-check"><div class="device-check-inner"></div></div>
      <div class="device-info">
        <div class="device-name">${escapeHtml(dev.name)}</div>
        <div class="device-status">
          <span class="status-dot ${dev.status}"></span>
          ${statusLabel(dev.status)}
        </div>
        ${trackName ? `<div class="device-track-name">♪ ${escapeHtml(trackName)}</div>` : ""}
      </div>
      <button class="delete-btn" title="デバイスを削除">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/>
        </svg>
      </button>
    `;
    card.querySelector(".delete-btn").onclick = (e) => {
      e.stopPropagation();
      deleteDevice(dev.device_id);
    };
    list.appendChild(card);
  });

  updatePlayButton();
}

function renderHistory() {
  const section = document.getElementById("historySection");
  const list = document.getElementById("historyList");
  const tracks = Object.values(state.tracks);

  if (tracks.length === 0) {
    section.style.display = "none";
    return;
  }

  section.style.display = "block";
  list.innerHTML = "";

  tracks.forEach((t) => {
    const item = document.createElement("div");
    item.className = "history-item";
    item.onclick = () => {
      state.currentTrack = t;
      renderNowPlaying();
      updatePlayButton();
    };

    const isCurrent = state.currentTrack && state.currentTrack.id === t.id;
    if (isCurrent) item.style.borderColor = "var(--accent)";

    item.innerHTML = `
      <img class="history-thumb" src="${t.thumbnail || ""}"
           onerror="this.style.display='none'" alt="" />
      <div class="history-info">
        <div class="history-title">${escapeHtml(t.title)}</div>
        <div class="history-meta">${t.channel ? escapeHtml(t.channel) + " · " : ""}${formatDuration(t.duration)}</div>
      </div>
      <button class="delete-btn" title="トラックを削除">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/>
        </svg>
      </button>
    `;
    item.querySelector(".delete-btn").onclick = (e) => {
      e.stopPropagation();
      deleteTrack(t.id);
    };
    list.appendChild(item);
  });
}

// ────────────────────────────────────────
// Interactions
// ────────────────────────────────────────
function toggleDevice(deviceId) {
  if (state.selectedDevices.has(deviceId)) {
    state.selectedDevices.delete(deviceId);
  } else {
    state.selectedDevices.add(deviceId);
  }
  renderDevices();
}

function selectAllDevices() {
  const allIds = Object.keys(state.devices);
  if (state.selectedDevices.size === allIds.length) {
    state.selectedDevices.clear();
  } else {
    allIds.forEach((id) => state.selectedDevices.add(id));
  }
  renderDevices();
}

async function deleteDevice(deviceId) {
  try {
    const res = await authFetch(`/api/devices/${encodeURIComponent(deviceId)}`, { method: "DELETE" });
    if (!res.ok) throw new Error("削除に失敗しました");
    state.selectedDevices.delete(deviceId);
    delete state.devices[deviceId];
    renderDevices();
    showToast("デバイスを削除しました");
  } catch (e) {
    showToast(`エラー: ${e.message}`);
  }
}

async function deleteTrack(trackId) {
  try {
    const res = await authFetch(`/api/tracks/${encodeURIComponent(trackId)}`, { method: "DELETE" });
    if (!res.ok) throw new Error("削除に失敗しました");
    delete state.tracks[trackId];
    if (state.currentTrack && state.currentTrack.id === trackId) {
      state.currentTrack = null;
      renderNowPlaying();
    }
    renderHistory();
    updatePlayButton();
    showToast("トラックを削除しました");
  } catch (e) {
    showToast(`エラー: ${e.message}`);
  }
}

function updatePlayButton() {
  const btn = document.getElementById("playBtn");
  btn.disabled = !state.currentTrack || state.selectedDevices.size === 0;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ────────────────────────────────────────
// URL input: Enter key & paste detection
// ────────────────────────────────────────
document.getElementById("urlInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") extractAudio();
});

document.getElementById("urlInput").addEventListener("paste", () => {
  // 少し待ってからペースト内容を確認
  setTimeout(() => {
    const val = document.getElementById("urlInput").value.trim();
    if (val.match(/youtube\.com|youtu\.be/)) {
      // 自動取得
      extractAudio();
    }
  }, 100);
});

// ────────────────────────────────────────
// Auth
// ────────────────────────────────────────
document.getElementById("tokenInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") saveToken();
});

// ────────────────────────────────────────
// Init
// ────────────────────────────────────────
(async () => {
  try {
    const res = await fetch("/api/tracks", { headers: authHeaders() });
    if (res.status === 401) {
      showAuthModal();
      return;
    }
  } catch {}
  connectWS();
})();
</script>
</body>
</html>
